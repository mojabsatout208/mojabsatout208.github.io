<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Test</title>
  <style>
    body{font-family:Arial,sans-serif;background:#111;color:#fff;max-width:800px;margin:40px auto;padding:20px}
    .box{background:#1b1b1b;border:1px solid #333;padding:16px;margin:16px 0;border-radius:10px}
    audio{width:100%;display:block;margin-top:10px}
  </style>
</head>
<body>
  <h1>Audio Test</h1>
  <p>Wenn diese Player gehen, liegt das Problem am Layout der großen Seite, nicht an den Dateien.</p>

  <div class="box">
    <strong>Part 1</strong>
    <audio controls preload="metadata">
      <source src="audio/Part%201.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="box">
    <strong>Part 2</strong>
    <audio controls preload="metadata">
      <source src="audio/Part%202.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="box">
    <strong>Part 3</strong>
    <audio controls preload="metadata">
      <source src="audio/Part%203.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="box">
    <strong>Part 4</strong>

      <source src="audio/Part%204.mp3" type="audio/mpeg">
    </audio>
  </div>
</body>
</html>
